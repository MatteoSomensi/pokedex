name: Android CD - Release

on:
  push:
    tags:
      - 'v*' # Trigger deployment when a tag like v1.0.0 is pushed
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  release:
    name: Build, Sign and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-release-aab
          path: ${{steps.sign_app.outputs.signedReleaseFile}}

      # Uncomment the following step to enable automatic Play Store deployment
      # Requires a Google Play Console API Service Account JSON stored in GitHub Secrets
